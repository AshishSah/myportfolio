<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Name | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <img src="./profile.jpg" alt="Profile Photo" class="profile">

        <h1>Your Name</h1>
        <h3>Senior Backend Engineer (.NET)</h3>

        <p>
            I build scalable backend systems and APIs.
            Interested in distributed systems and architecture.
        </p>

        <div class="links">
 <a href="cv.pdf" target="_blank" title="View my professional resume">📄 Resume</a>
    <a href="cover-letter.pdf" target="_blank" title="Short intro about me">✉️ Cover Letter</a>
    <a href="https://github.com/yourusername" target="_blank" title="Check my projects">💻 GitHub</a>

            <a href="https://linkedin.com/in/yourprofile" target="_blank">🔗 LinkedIn</a>
        </div>
    </div>
<div id="previewBox"></div>
</body>
</html>

<script>
const preview = document.getElementById("previewBox");

document.querySelectorAll(".links a").forEach(link => {
    link.addEventListener("mouseenter", () => {
        preview.innerText = link.getAttribute("title");
        preview.style.display = "block";
    });

    link.addEventListener("mouseleave", () => {
        preview.style.display = "none";
    });
}); 
</script>

<script>
document.querySelector("h1").addEventListener("click", () => {
    alert("Thanks for visiting my portfolio 🚀");
});
</script>

<script>
document.body.addEventListener("click", () => {
    console.log("User clicked somewhere 👀");
});
</script>
